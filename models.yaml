# ==========================================================================
# SALES DATA GENERATION MODELS
# ==========================================================================
#
# This file controls product-level sales behavior:
#   - Basket size (quantity per order)
#   - Price drift, markdowns, and snapping
#   - Brand popularity rotation
#   - Return reasons and timing
#
# Business shape (growth trajectory, customer lifecycle, demand behavior)
# is controlled by the trend preset in macro_demand.trend below
# ==========================================================================

models:

  macro_demand:
    trend: gradual-growth          # controls revenue shape + customer lifecycle
                                    # directional (extend over time):
                                    #   steady-growth | strong-growth | gradual-growth
                                    #   hockey-stick | decline | new-market-entry
                                    # cyclical (repeat every 10 years):
                                    #   boom-and-bust | recession-recovery | seasonal-dominant
                                    #   plateau | volatile | double-dip
                                    #   seasonal-with-growth | slow-decline | stagnation
  # ================================================================
  # QUANTITY — items per order (basket size)
  # ================================================================
  quantity:
    base_poisson_lambda: 2.1
    min_qty: 1
    max_qty: 4

    # Phase 3.1 — quantity depends on price + product propensity (elasticity),
    # so cheap staples sell in larger baskets than expensive durables.
    elasticity:
      enabled: true
      price_elasticity: 0.5        # ε: qty *= (price / reference_price)^(-ε)
      reference_price: null        # null = median catalog list price (auto)
      factor_clip: [0.4, 2.5]
      propensity_strength: 0.4     # γ: qty *= (PopularityScore / 50)^γ
      propensity_clip: [0.6, 1.6]

    monthly_factors:
      - 0.99    # Jan
      - 0.98    # Feb
      - 1.00    # Mar
      - 1.00    # Apr
      - 1.01    # May
      - 1.02    # Jun
      - 1.02    # Jul
      - 1.01    # Aug
      - 1.00    # Sep
      - 1.03    # Oct
      - 1.06    # Nov
      - 1.05    # Dec

    noise_sigma: 0.12


  # ================================================================
  # PRICING — inflation drift + realistic price snapping
  # ================================================================
  pricing:
    inflation:
      annual_rate: 0.10
      month_volatility_sigma: 0.015
      factor_clip: [1.00, 1.50]
      volatility_seed: 123

    markdown:
      enabled: true
      max_pct_of_price: 0.40
      min_net_price: 0.01
      allow_negative_margin: false
      reconcile_promotions: true    # discounts only on promoted lines (Phase 3.5);
                                    # false = legacy independent markdown lottery

      ladder:
        - { kind: none, value: 0.0,   weight: 0.55 }
        - { kind: pct,  value: 0.05,  weight: 0.14 }
        - { kind: pct,  value: 0.10,  weight: 0.13 }
        - { kind: pct,  value: 0.15,  weight: 0.08 }
        - { kind: pct,  value: 0.20,  weight: 0.05 }
        - { kind: pct,  value: 0.25,  weight: 0.03 }
        - { kind: pct,  value: 0.30,  weight: 0.02 }

    appearance:
      enabled: true

      unit_price:
        rounding: floor
        endings:
          - { value: 0.99, weight: 1.0 }
        bands:
          - { max: 100,  step: 1 }
          - { max: 500,  step: 5 }
          - { max: 2000, step: 10 }
          - { max: 5000, step: 25 }
          - { max: 1e18, step: 50 }

      unit_cost:
        rounding: nearest
        endings:
          - { value: 0.00, weight: 1.0 }
        bands:
          - { max: 100,   step: 1 }
          - { max: 500,   step: 5 }
          - { max: 2000,  step: 10 }
          - { max: 10000, step: 25 }
          - { max: 1e18,  step: 50 }

      discount:
        rounding: floor
        bands:
          - { max: 10,   step: 1 }
          - { max: 50,   step: 5 }
          - { max: 200,  step: 10 }
          - { max: 1000, step: 25 }
          - { max: 1e18, step: 50 }


  # ================================================================
  # BRAND POPULARITY — rotating "winner" brand each year
  # ================================================================
  brand_popularity:
    enabled: true
    seed: 123
    winner_boost: 1.4


  # ================================================================
  # PROMOTION SALIENCE — deeper promos redeemed more often (Phase 3.2)
  # ================================================================
  promotions:
    enabled: true
    beta: 3.0                # salience = exp(beta * DiscountPct) * type_weight
    max_weight_ratio: 12.0   # cap deepest/shallowest selection-weight spread
    type_weights: {}         # optional PromotionType -> multiplier overrides,
                             # e.g. { "Flash Sale": 1.5, "Clearance": 1.3 }


  # ================================================================
  # BASKET THEME — co-purchase correlation within an order (Phase 3.3)
  # ================================================================
  # Each order is assigned a hash-seeded theme (a group of subcategories);
  # a share of its off-theme lines are redirected into that theme so multi-line
  # orders hold complementary items and affinity mining recovers real rules.
  basket:
    enabled: true
    num_themes: 6      # number of subcategory groups
    strength: 0.5      # share of off-theme lines redirected toward the theme


  # ================================================================
  # FULFILLMENT FRICTION — delivery timing ↔ returns (Phase 3.4)
  # ================================================================
  # One per-line friction latent (hash-seeded on OrderNumber+OrderLineNumber)
  # drives delivery bucketing AND return behavior, so late deliveries yield
  # more / faster returns.
  fulfillment:
    enabled: true
    p_early: 0.10               # share delivered early
    p_delayed: 0.20             # share delivered late (on-time = remainder)
    delay_distribution: triangular   # uniform | triangular
    delay_min: 1
    delay_max: 10
    delay_mode: 3               # peak days for triangular delay magnitude
    return_prob_boost: 1.0      # p_return = base * (1 + boost * friction)
    return_lag_shorten: 0.5     # lag *= (1 - shorten * friction)


  # ================================================================
  # RETURNS
  # ================================================================
  returns:
    # Returns on/off is controlled by config.yaml -> returns.enabled.
    # This section only shapes returns when they are enabled there
    # (reason mix, timing, and quantity behavior).
    reasons:                               # keys/labels/categories defined in defaults.py
      - { key: 1, weight: 0.20 }           # Defective (Quality)
      - { key: 2, weight: 0.12 }           # Damaged in shipping (Logistics)
      - { key: 3, weight: 0.14 }           # Wrong item (Fulfillment)
      - { key: 4, weight: 0.10 }           # Not as described (Customer)
      - { key: 5, weight: 0.14 }           # No longer needed (Customer)
      - { key: 6, weight: 0.08 }           # Late delivery (Logistics)
      - { key: 7, weight: 0.07 }           # Better price found (Customer)
      - { key: 8, weight: 0.15 }           # Other (Other)

    lag_days:
      distribution: triangular
      mode: 7
      split_min_gap: 3              # min days between split return events
      split_max_gap: 20             # max days between split return events

    quantity:
      full_line_probability: 0.85   # probability of returning full line qty
      split_return_rate: 0.20       # fraction of returns that split across multiple events
      max_splits: 3                 # max return events per line item
