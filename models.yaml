# ==========================================================================
# SALES DATA GENERATION MODELS
# ==========================================================================
#
# This file controls product-level sales behavior:
#   - Basket size (quantity per order)
#   - Price drift, markdowns, and snapping
#   - Brand popularity rotation
#   - Return reasons and timing
#
# Customer behavior (lifecycle, demand shape, growth) is controlled by
# the profile key in config.yaml → customers.profile
# ==========================================================================

models:

  macro_demand:
    trend: new-market-entry          # directional (extend over time):
                                    #   steady-growth | strong-growth | gradual-growth
                                    #   hockey-stick | decline | new-market-entry
                                    # cyclical (repeat every 10 years):
                                    #   boom-and-bust | recession-recovery | seasonal-dominant
                                    #   plateau | volatile | double-dip
                                    #   seasonal-with-growth | slow-decline | stagnation
  # ================================================================
  # QUANTITY — items per order (basket size)
  # ================================================================
  quantity:
    base_poisson_lambda: 2.1
    min_qty: 1
    max_qty: 4

    monthly_factors:
      - 0.99    # Jan
      - 0.98    # Feb
      - 1.00    # Mar
      - 1.00    # Apr
      - 1.01    # May
      - 1.02    # Jun
      - 1.02    # Jul
      - 1.01    # Aug
      - 1.00    # Sep
      - 1.03    # Oct
      - 1.06    # Nov
      - 1.05    # Dec

    noise_sigma: 0.12


  # ================================================================
  # PRICING — inflation drift + realistic price snapping
  # ================================================================
  pricing:
    inflation:
      annual_rate: 0.10
      month_volatility_sigma: 0.015
      factor_clip: [1.00, 1.50]
      volatility_seed: 123

    markdown:
      enabled: true
      max_pct_of_price: 0.40
      min_net_price: 0.01
      allow_negative_margin: false

      ladder:
        - { kind: none, value: 0.0,   weight: 0.55 }
        - { kind: pct,  value: 0.05,  weight: 0.14 }
        - { kind: pct,  value: 0.10,  weight: 0.13 }
        - { kind: pct,  value: 0.15,  weight: 0.08 }
        - { kind: pct,  value: 0.20,  weight: 0.05 }
        - { kind: pct,  value: 0.25,  weight: 0.03 }
        - { kind: pct,  value: 0.30,  weight: 0.02 }

    appearance:
      enabled: true

      unit_price:
        rounding: floor
        endings:
          - { value: 0.99, weight: 1.0 }
        bands:
          - { max: 100,  step: 1 }
          - { max: 500,  step: 5 }
          - { max: 2000, step: 10 }
          - { max: 5000, step: 25 }
          - { max: 1e18, step: 50 }

      unit_cost:
        rounding: nearest
        endings:
          - { value: 0.00, weight: 1.0 }
        bands:
          - { max: 100,   step: 1 }
          - { max: 500,   step: 5 }
          - { max: 2000,  step: 10 }
          - { max: 10000, step: 25 }
          - { max: 1e18,  step: 50 }

      discount:
        rounding: floor
        bands:
          - { max: 10,   step: 1 }
          - { max: 50,   step: 5 }
          - { max: 200,  step: 10 }
          - { max: 1000, step: 25 }
          - { max: 1e18, step: 50 }


  # ================================================================
  # BRAND POPULARITY — rotating "winner" brand each year
  # ================================================================
  brand_popularity:
    enabled: true
    seed: 123
    winner_boost: 1.4


  # ================================================================
  # RETURNS
  # ================================================================
  returns:
    enabled: true

    reasons:                               # keys/labels/categories defined in defaults.py
      - { key: 1, weight: 0.20 }           # Defective (Quality)
      - { key: 2, weight: 0.12 }           # Damaged in shipping (Logistics)
      - { key: 3, weight: 0.14 }           # Wrong item (Fulfillment)
      - { key: 4, weight: 0.10 }           # Not as described (Customer)
      - { key: 5, weight: 0.14 }           # No longer needed (Customer)
      - { key: 6, weight: 0.08 }           # Late delivery (Logistics)
      - { key: 7, weight: 0.07 }           # Better price found (Customer)
      - { key: 8, weight: 0.15 }           # Other (Other)

    lag_days:
      distribution: triangular
      mode: 7
      split_min_gap: 3              # min days between split return events
      split_max_gap: 20             # max days between split return events

    quantity:
      full_line_probability: 0.85   # probability of returning full line qty
      split_return_rate: 0.20       # fraction of returns that split across multiple events
      max_splits: 3                 # max return events per line item
