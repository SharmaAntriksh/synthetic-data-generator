# ==========================================================================
# DATA GENERATION CONFIG
# ==========================================================================

# ------------------------------------------------------------------
# SCALE — row/entity counts for each table (start here)
# ------------------------------------------------------------------
scale:
  sales_rows: 1_003_150
  products: 2832
  customers: 26883
  stores: 20
  geographies: 200
  promotions: { seasonal: 11, clearance: 4, limited: 5 }

# ------------------------------------------------------------------
# GLOBAL DEFAULTS
# ------------------------------------------------------------------
defaults:
  seed: 42
  dates:
    start: "2021-01-15"
    end: "2025-12-31"

paths:
  data_root: "./data"
  geography: "./data/parquet_dims/geography.parquet"
  names_folder: "./data/name_pools/people"
  final_output: "./generated_datasets"

facts:
  enabled: ["sales", "returns"]

# ------------------------------------------------------------------
# SALES
# ------------------------------------------------------------------
sales:
  max_lines_per_order: 5

  file_format: "parquet"              # csv | parquet | deltaparquet
  sales_output: "sales"               # sales | sales_order | both
  write_delta: true
  skip_order_cols: false

  merge_parquet: true
  merged_file: "sales.parquet"
  delete_chunks: true

  partitioning:
    enabled: true
    columns: ["Year", "Month"]

  advanced:
    chunk_size: 1_000_000
    workers: 8                        # null = auto-detect
    row_group_size: 2_000_000
    compression: "snappy"
    write_pyarrow: true
    heavy_pct: 5
    heavy_mult: 5

# ------------------------------------------------------------------
# RETURNS
# ------------------------------------------------------------------
returns:
  enabled: true
  return_rate: 0.03
  min_days_after_sale: 1
  max_days_after_sale: 60

# ------------------------------------------------------------------
# PRODUCTS
# ------------------------------------------------------------------
products:
  active_ratio: 0.94
  value_scale: 1                      # multiplier on all base prices
  price_range: [10, 3000]             # [min, max] UnitPrice
  margin_range: [0.20, 0.35]          # [min, max] cost margin pct
  brand_normalize: true               # pull brand prices toward global median

# ------------------------------------------------------------------
# CUSTOMERS
# ------------------------------------------------------------------
customers:
  active_ratio: 0.95

  pct_india: 10
  pct_us: 51
  pct_eu: 39
  pct_org: 1

  lifecycle:
    enable_churn: true
    base_monthly_churn: 0.52
    min_tenure_months: 22
    initial_active_customers: 2000
    initial_spread_months: 36

# ------------------------------------------------------------------
# CUSTOMER SEGMENTS (disabled by default)
# ------------------------------------------------------------------
customer_segments:
  enabled: false
  generate_bridge: false

  segment_count: 10
  segments_per_customer_min: 1
  segments_per_customer_max: 2

  include_score: true
  include_primary_flag: true
  include_validity: true

  validity:
    grain: month
    churn_rate_qtr: 0.08
    new_customer_months: 2

  seed: 123

# ------------------------------------------------------------------
# SUPERPOWERS (disabled by default)
# ------------------------------------------------------------------
superpowers:
  enabled: false
  generate_bridge: false

  powers_count: 10
  powers_per_customer_min: 1
  powers_per_customer_max: 2

  include_power_level: true
  include_primary_flag: true
  include_acquired_date: true
  include_validity: false

  seed: 123

# ------------------------------------------------------------------
# GEOGRAPHY
# ------------------------------------------------------------------
geography:
  country_weights:
    United States: 0.35
    India: 0.20
    United Kingdom: 0.10
    Germany: 0.10
    France: 0.10
    Australia: 0.07
    Canada: 0.08

# ------------------------------------------------------------------
# PROMOTIONS
# ------------------------------------------------------------------
promotions: {}

# ------------------------------------------------------------------
# STORES
# ------------------------------------------------------------------
stores:
  ensure_currency_coverage: true

  opening:
    start: "1995-01-01"
    end:   "2023-12-31"
  closing_end: "2028-12-31"

# ------------------------------------------------------------------
# EMPLOYEES
# ------------------------------------------------------------------
employees:
  use_store_employee_count: false
  min_staff_per_store: 3
  max_staff_per_store: 8

  hr:
    email_domain: "contoso.com"

  store_assignments:
    enabled: true
    ensure_store_sales_coverage: true
    min_primary_sales_per_store: 2
    primary_sales_role: "Sales Associate"

    mover_share: 0.25
    pool_scope: district
    allow_store_revisit: false

    role_profiles:
      default:
        role_multiplier: 0.25
        episodes_min: 0
        episodes_max: 1
        duration_days_min: 60
        duration_days_max: 180

      Sales Associate:
        role_multiplier: 2.50
        episodes_min: 1
        episodes_max: 4
        duration_days_min: 60
        duration_days_max: 240

      Cashier:
        role_multiplier: 1.10
        episodes_min: 0
        episodes_max: 3
        duration_days_min: 14
        duration_days_max: 120

      Fulfillment Associate:
        role_multiplier: 0.40
        episodes_min: 0
        episodes_max: 2
        duration_days_min: 45
        duration_days_max: 180

# ------------------------------------------------------------------
# DATES (Dimension)
# ------------------------------------------------------------------
dates:
  fiscal_start_month: 5
  as_of_date: null

  include:
    calendar: false
    iso: false
    fiscal: true
    weekly_fiscal: false

  weekly_calendar:
    enabled: true
    first_day_of_week: 0
    weekly_type: "Last"
    quarter_week_type: "445"
    type_start_fiscal_year: 1

# ------------------------------------------------------------------
# EXCHANGE RATES
# ------------------------------------------------------------------
exchange_rates:
  use_global_dates: true
  master_file: "./data/exchange_rates_master/fx_master.parquet"

  currencies: ["USD", "EUR", "INR", "GBP", "AUD", "CAD"]
  base_currency: "USD"
  volatility: 0.02

# ------------------------------------------------------------------
# BUDGET
# ------------------------------------------------------------------
budget:
  enabled: true
  report_currency: "USD"
  scenarios:
    Low: -0.03
    Medium: 0.00
    High: 0.05
  growth_caps:
    high: 0.30
    low: -0.20
  weights:
    local: 0.60
    category: 0.30
    global: 0.10
  default_backcast_growth: 0.05
  return_rate_cap: 0.30
