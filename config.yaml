# ==========================================================================
# DATA GENERATION CONFIG
# ==========================================================================

# ------------------------------------------------------------------
# SCALE — row/entity counts for each table (start here)
# ------------------------------------------------------------------
scale:
  sales_rows: 1003285
  products: 2517
  customers: 21834
  stores: 100
  promotions: { seasonal: 11, clearance: 4, limited: 5, flash: 6, volume: 4, loyalty: 3, bundle: 3, new_customer: 3 }

# ------------------------------------------------------------------
# GLOBAL DEFAULTS
# ------------------------------------------------------------------
defaults:
  seed: 42
  random: false                    # true = ignore seeds, use OS entropy (non-deterministic)
  view_schema: "report"               # dbo = vw_ prefix (default), or dedicated schema (bi, report, etc.)
  dates:
    start: "2021-03-01"
    end: "2025-10-31"

paths:
  geography: "./data/parquet_dims/geography.parquet"
  names_folder: "./data/name_pools/people"
  fx_master: "./data/exchange_rates_master/fx_master.parquet"
  final_output: "./generated_datasets"

# ------------------------------------------------------------------
# SALES
# ------------------------------------------------------------------
sales:
  max_lines_per_order: 5

  file_format: "parquet"              # csv | parquet | deltaparquet
  sales_output: "sales"               # sales | sales_order | both
  skip_order_cols: false

  merge:
    enabled: true
    file: "sales.parquet"
    delete_chunks: true

  partition_by: ["Year", "Month"]     # null or [] to disable

  optimize: false                      # sort merged files for better query perf
  quality_report: false                  # generate HTML data quality report after packaging

  advanced:
    chunk_size: 500000
    workers: 6                        # null = auto-detect
    row_group_size: 1_000_000
    compression: "snappy"
    write_pyarrow: true

# ------------------------------------------------------------------
# RETURNS
# ------------------------------------------------------------------
returns:
  enabled: true
  return_rate: 0.03
  min_days_after_sale: 1
  max_days_after_sale: 60

# ------------------------------------------------------------------
# PRODUCTS
# ------------------------------------------------------------------
products:
  active_ratio: 0.98
  value_scale: 1                      # multiplier on all base prices
  price_range: [10, 3000]             # [min, max] ListPrice
  margin_range: [0.20, 0.35]          # [min, max] cost margin pct
  
  brand_normalize: false               # pull brand prices toward global median
  brand_normalize_alpha: 0.35         # brands keep 65% of price identity

  scd2:
    enabled: true                     # enable SCD Type 2 price history tracking
    revision_frequency: 8             # months between price revisions
    price_drift: 0.05                  # ~5% price change per revision
    max_versions: 4                    # max version rows per product

# ------------------------------------------------------------------
# CUSTOMERS
# ------------------------------------------------------------------
customers:
  active_ratio: 0.98
  household_pct: 0.35               # fraction of individuals in multi-person households

  region_mix: { US: 51, EU: 39, India: 10 }
  org_pct: 1

  profile: steady                   # gradual | steady | aggressive | instant
  first_year_pct: 0.27              # #% of customers in year 1, rest acquired over time

  scd2:
    enabled: true                    # enable SCD Type 2 history tracking
    change_rate: 0.15                # fraction of customers with life event changes
    max_versions: 4                  # max version rows per customer

# ------------------------------------------------------------------
# WISHLISTS
# ------------------------------------------------------------------
wishlists:
  enabled: true
  participation_rate: 0.35        # fraction of customers who wishlist
  avg_items: 3.5                  # mean items per participant (Poisson λ)
  max_items: 20                   # cap per customer
  pre_browse_days: 90             # days before CustomerStartDate wishlisting can begin
  affinity_strength: 0.6          # probability of picking from same subcategory as a prior item
  conversion_rate: 0.50            # fraction of wishlist items drawn from actual purchases
  seed: 500

# ------------------------------------------------------------------
# COMPLAINTS
# ------------------------------------------------------------------
complaints:
  enabled: true
  complaint_rate: 0.03              # fraction of customers who file a complaint
  repeat_complaint_rate: 0.15       # fraction of complainers who file more than one
  max_complaints: 5                 # max complaints per customer
  resolution_rate: 0.85             # fraction of complaints that get resolved
  escalation_rate: 0.10             # fraction of unresolved that get escalated (rest stay open)
  avg_response_days: 5              # mean days to resolve
  max_response_days: 30             # cap on resolution time
  seed: 600

# ------------------------------------------------------------------
# SUBSCRIPTIONS (bridge table for DAX many-to-many patterns)
# ------------------------------------------------------------------
subscriptions:
  enabled: true
  generate_bridge: true

  participation_rate: 0.65          # fraction of customers who subscribe
  avg_subscriptions_per_customer: 1.5
  max_subscriptions: 5
  churn_rate: 0.25                  # fraction that cancel before expiry
  trial_rate: 0.30                  # fraction that start with a trial

  seed: 700

# ------------------------------------------------------------------
# GEOGRAPHY (static — derived from CURATED_ROWS in geography.py)
# ------------------------------------------------------------------
geography: {}

# ------------------------------------------------------------------
# PROMOTIONS
# ------------------------------------------------------------------
promotions:
  new_customer_window_months: 3    # months after CustomerStartDate where New Customer promo applies (0 = same month only)

# ------------------------------------------------------------------
# STORES
# ------------------------------------------------------------------
stores:
  ensure_iso_coverage: true
  district_size: 10
  districts_per_region: 8
  online_stores: 10                    # explicit count (carved from scale.stores total)
  online_close_share: 0.10             # fraction of online stores that close

  opening:
    start: "2018-01-01"
    end:   "2025-12-31"
  closing_end: "2028-12-31"

  # Store closure: controls which stores close during the dataset window
  closing:
    enabled: true
    close_share: 0.10              # fraction of physical stores that close
    transfer_share: 0.60           # fraction of employees transferred (rest terminated)
    notice_days: 30                # wind-down period before closure (staggered departures)
    prefer_same_district: true     # transferred employees go to same-district stores first
    ramp_days: 30                  # productivity ramp-up period at new store
    ramp_start_factor: 0.50        # sales weight starts at 50%, ramps to 100%

  # Product assortment per store type (which subcategories each store carries)
  assortment:
    enabled: true                    # false = every store sells every product (debug/test only) i.e. CROSSJOIN
                                     # Tiny test runs: For unit tests with 2 stores and 5 products, assortment filtering might eliminate 
                                     # too many combinations and produce empty results.
    seed: 42
    coverage:                        # fraction of subcategories carried by store type
      Online: 1.00                   # full catalog
      Hypermarket: 0.85
      Supermarket: 0.50
      Convenience: 0.25

# ------------------------------------------------------------------
# EMPLOYEES
# ------------------------------------------------------------------
employees:
  # district_size / districts_per_region now live under 'stores:' (single source of truth).
  # Values here are ignored; hierarchy is read from stores.parquet.
  use_store_employee_count: false
  min_staff_per_store: 2
  max_staff_per_store: 6

  hr:
    email_domain: "contoso.com"

  store_assignments:
    enabled: true
    ensure_store_sales_coverage: true
    min_primary_sales_per_store: 1
    primary_sales_role: "Sales Associate"
    movable_sales_per_store: 2

    mover_share: 0.20
    pool_scope: district
    allow_store_revisit: true

    role_profiles:
      default:                 { mult: 0.25, episodes: [0, 1], duration: [60, 180]  }
      Sales Associate:         { mult: 2.50, episodes: [2, 4], duration: [60, 240]  }
      Cashier:                 { mult: 1.10, episodes: [0, 2], duration: [14, 120]  }
      Fulfillment Associate:   { mult: 0.40, episodes: [0, 1], duration: [45, 180]  }

# ------------------------------------------------------------------
# DATES (Dimension)
# ------------------------------------------------------------------
dates:
  fiscal_start_month: 5
  as_of_date: null

  include:
    calendar: true
    iso: false
    fiscal: true

    weekly_fiscal:
      enabled: false
      first_day_of_week: 0
      weekly_type: "Last"
      quarter_week_type: "445"
      type_start_fiscal_year: 1

# ------------------------------------------------------------------
# EXCHANGE RATES
# ------------------------------------------------------------------
exchange_rates:
  use_global_dates: true

  currencies: ["CAD", "GBP", "EUR", "INR", "AUD", "CNY", "JPY"] #, "KRW", "SGD", "AED", "ZAR", "BRL", "MXN"]
  base_currency: "USD"

  volatility: 0.02
  future_annual_drift: 0.02   # annual compounding rate applied to project rates beyond today
  # refresh_fx_master is CLI-only: use --refresh-fx-master flag

# ------------------------------------------------------------------
# BUDGET
# ------------------------------------------------------------------
budget:
  enabled: true
  report_currency: "USD"
  scenarios:   { Low: -0.03, Medium: 0.00, High: 0.05 }
  growth_caps: { high: 0.30, low: -0.20 }
  weights:     { local: 0.60, category: 0.30, global: 0.10 }
  default_backcast_growth: 0.05
  return_rate_cap: 0.30
  
# ------------------------------------------------------------------
# INVENTORY SNAPSHOT
# ------------------------------------------------------------------
inventory:
  enabled: true
  seed: 42
  grain: monthly                       # monthly | quarterly
  partition_by: ["Year", "Month"]      # null or [] to disable (used by deltaparquet)
  abc_filter: null                     # null = all classes; ["A", "B"] = skip C-class products

  min_demand_months: 6
  initial_stock_multiplier: 1.5        # was 3.0 — start with 1.5 months of avg demand, not 3
  reorder_compliance: 0.65             # was 0.85 — 35% of reorders are late/missed (realistic)
  lead_time_variance: 0.40             # was 0.20 — wider delivery jitter (±40%)
  overstock_bias: 1.0                  # was 1.15 — no systematic over-ordering

  abc_stock_multiplier:
    A: 1.20                            # was 1.30
    B: 1.00
    C: 0.60                            # C-class products are more neglected

  shrinkage:
    enabled: true
    rate: 0.02