<script>
(function(){try{var t=localStorage.getItem("rdg-theme");if(t)document.documentElement.setAttribute("data-theme",t);}catch(e){}})();
</script>
<div id="root"></div>

<!-- App modules (order matters — each builds on the previous) -->
<script type="text/babel" src="/static/components.jsx"></script>
<script type="text/babel" src="/static/yaml-editor.jsx"></script>
